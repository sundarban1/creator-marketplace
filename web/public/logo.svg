<svg viewBox="0 0 520 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kolab logo with wordmark">
  <defs>
    <linearGradient id="creator2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5913F"/>
      <stop offset="1" stop-color="#D34E12"/>
    </linearGradient>
    <linearGradient id="brand2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4356D6"/>
      <stop offset="1" stop-color="#232C9E"/>
    </linearGradient>
    <linearGradient id="blend2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9448E0"/>
      <stop offset="1" stop-color="#6B2EC2"/>
    </linearGradient>
    <linearGradient id="oAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E8641E"/>
      <stop offset="1" stop-color="#2E3ABE"/>
    </linearGradient>
    <clipPath id="brandBodyClip2">
      <path d="M98 190 C98 140 125 112 158 112 C191 112 218 140 218 190 Z"/>
    </clipPath>
  </defs>

  <!-- Mark -->
  <g transform="translate(4,35) scale(0.62)">
    <circle cx="82" cy="62" r="34" fill="url(#creator2)"/>
    <path d="M22 190 C22 140 49 112 82 112 C115 112 142 140 142 190 Z" fill="url(#creator2)"/>
    <rect x="124" y="28" width="68" height="68" rx="21" fill="url(#brand2)"/>
    <path d="M98 190 C98 140 125 112 158 112 C191 112 218 140 218 190 Z" fill="url(#brand2)"/>
    <path d="M22 190 C22 140 49 112 82 112 C115 112 142 140 142 190 Z"
          fill="url(#blend2)" clip-path="url(#brandBodyClip2)"/>
  </g>

  <!-- Wordmark: hand-drawn rounded letterforms -->
  <g fill="none" stroke="#241E3F" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
    <!-- k -->
    <path d="M188 62 L188 138"/>
    <path d="M218 86 L189 112 L219 138"/>
    <!-- o (accent: creator-to-brand gradient) -->
    <circle cx="270" cy="112" r="26" stroke="url(#oAccent)"/>
    <!-- l -->
    <path d="M322 62 L322 138"/>
    <!-- a -->
    <circle cx="370" cy="112" r="26"/>
    <path d="M396 90 L396 138"/>
    <!-- b -->
    <path d="M428 62 L428 138"/>
    <circle cx="454" cy="112" r="26"/>
  </g>

  <!-- Play button integrated inside the "o" -->
  <path d="M264 103.5 L280.5 112 L264 120.5 Z" fill="#4A0E5C" stroke="#4A0E5C" stroke-width="3.5" stroke-linejoin="round"/>
</svg>
