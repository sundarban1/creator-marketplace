<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kolab 3D app icon">
  <defs>
    <!-- Sphere-style gradients: light source top-left -->
    <radialGradient id="creatorSphere" cx="0.35" cy="0.25" r="1">
      <stop offset="0" stop-color="#D9741F"/>
      <stop offset="0.45" stop-color="#B84A0E"/>
      <stop offset="1" stop-color="#7A2D08"/>
    </radialGradient>
    <radialGradient id="brandSphere" cx="0.35" cy="0.25" r="1">
      <stop offset="0" stop-color="#4553C4"/>
      <stop offset="0.45" stop-color="#2733A3"/>
      <stop offset="1" stop-color="#101460"/>
    </radialGradient>
    <radialGradient id="blendSphere" cx="0.4" cy="0.2" r="1">
      <stop offset="0" stop-color="#8547CC"/>
      <stop offset="0.5" stop-color="#6128AC"/>
      <stop offset="1" stop-color="#38127C"/>
    </radialGradient>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="cHead3d"><circle cx="82" cy="62" r="34"/></clipPath>
    <clipPath id="bHead3d"><rect x="124" y="28" width="68" height="68" rx="21"/></clipPath>
    <clipPath id="cBody3d"><path d="M22 190 C22 140 49 112 82 112 C115 112 142 140 142 190 Z"/></clipPath>
    <clipPath id="bBody3d"><path d="M98 190 C98 140 125 112 158 112 C191 112 218 140 218 190 Z"/></clipPath>
  </defs>

  <!-- Background squircle with depth -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="114" fill="#FFFFFF" stroke="#E9E5F3" stroke-width="3"/>

  <g transform="translate(3.8,27.1) scale(2.1)">
    <!-- Creator figure -->
    <circle cx="82" cy="62" r="34" fill="url(#creatorSphere)" filter="url(#softShadow)"/>
    <path d="M22 190 C22 140 49 112 82 112 C115 112 142 140 142 190 Z" fill="url(#creatorSphere)" filter="url(#softShadow)"/>

    <!-- Brand figure -->
    <rect x="124" y="28" width="68" height="68" rx="21" fill="url(#brandSphere)" filter="url(#softShadow)"/>
    <path d="M98 190 C98 140 125 112 158 112 C191 112 218 140 218 190 Z" fill="url(#brandSphere)" filter="url(#softShadow)"/>

    <!-- Overlap: violet blend with its own depth -->
    <g clip-path="url(#bBody3d)">
      <path d="M22 190 C22 140 49 112 82 112 C115 112 142 140 142 190 Z" fill="url(#blendSphere)"/>
    </g>

    <!-- Spark: glow + gloss + lift -->
    <circle cx="120" cy="104.8" r="14" fill="#4A0E5C" stroke="#9B7BDF" stroke-width="2.5" filter="url(#softShadow)"/>
    <path d="M115.9 98.7 L127.6 104.8 L115.9 110.9 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2.3" stroke-linejoin="round"/>
  </g>
</svg>
