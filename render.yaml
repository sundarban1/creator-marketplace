databases:
  - name: marketplace-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: marketplace-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Core ────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info

      # ── Database — wired to the Render Postgres instance above ──────────────
      - key: DATABASE_URL
        fromDatabase:
          name: marketplace-db
          property: connectionString

      # ── Auth secrets — Render generates strong random values on first deploy ─
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ── CORS — set to your deployed web app origin(s), comma-separated ──────
      - key: FRONTEND_URL
        sync: false

      # ── Email (Gmail SMTP) — fill in via Render dashboard ────────────────────
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_SECURE
        sync: false
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # ── Cloudinary (avatar/logo/document uploads) — fill in via dashboard ───
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── AI campaign generator — fill in via dashboard ────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
