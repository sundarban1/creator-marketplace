databases:
  - name: kolab
    plan: free
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: marketplace-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Core ────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info

      # ── Database — wired to the Render Postgres instance above. After this
      # database's first deploy (migrations run automatically via
      # docker-entrypoint.sh), open the service's Shell tab on the Render
      # dashboard and run `npm run db:seed` once to populate categories,
      # platforms, the admin account, and help/FAQ/legal content. ─────────────
      - key: DATABASE_URL
        fromDatabase:
          name: kolab
          property: connectionString

      # ── Auth secrets — Render generates strong random values on first deploy ─
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

      # ── CORS — set to your deployed web app origin(s), comma-separated ──────
      - key: FRONTEND_URL
        sync: false

      # ── Email (Gmail SMTP) — fill in via Render dashboard ────────────────────
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_SECURE
        sync: false
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false

      # ── Cloudinary (avatar/logo/document uploads) — fill in via dashboard ───
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── AI campaign generator — fill in via dashboard ────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── TikTok Login Kit (creator social-account OAuth connect) ─────────────
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: TIKTOK_REDIRECT_URI
        value: https://marketplace-backend-ofge.onrender.com/api/creator/social-accounts/tiktok/callback
      - key: APP_SCHEME
        value: kolab

      # ── Facebook Login (creator social-account OAuth connect) — App ID is public,
      # already embedded in the mobile client; only the secret needs the dashboard ──
      - key: FACEBOOK_APP_ID
        value: "1740519673635792"
      - key: FACEBOOK_APP_SECRET
        sync: false

      # ── Instagram API with Instagram Login (direct connect) — fill in via dashboard ─
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        value: https://marketplace-backend-ofge.onrender.com/api/creator/social-accounts/instagram-login/callback

      # ── Google OAuth (YouTube connect token refresh). Client IDs are public, already
      # embedded in the mobile client; only the Web client's secret needs the dashboard.
      # Android/iOS client IDs have no secret (public/native clients) but ARE required —
      # native refresh tokens are minted under them, not the Web client.
      - key: GOOGLE_WEB_CLIENT_ID
        value: "543768819635-f201e9a0pe6uegkhvm9fcnjm6hf8b2g5.apps.googleusercontent.com"
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        value: "543768819635-at5jjekqobcots66gl7lv0gufh8b6rp3.apps.googleusercontent.com"
      - key: GOOGLE_IOS_CLIENT_ID
        value: "543768819635-fuslrtr8mt6bmi2jslc3h3hcqg4drhdk.apps.googleusercontent.com"
